<!DOCTYPE html>
<html>
<head>
    <title>Email Storage</title>
</head>
<body>

    <h2>Store Email in Database</h2>

    <form method="POST">
        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <button type="submit">
            Save Email
        </button>
    </form>

</body>
</html>
